name: Publish Go module

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  index-module:
    name: Index module on proxy.golang.org
    runs-on: ubuntu-latest

    steps:
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: false

      - name: Request module version from Go proxy
        env:
          VERSION: ${{ github.event.release.tag_name }}
          GOPROXY: https://proxy.golang.org
        run: go list -m "github.com/z-xavier/migadu-go@${VERSION}"